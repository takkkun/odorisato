name: Promote to production

on:
  workflow_dispatch:
  repository_dispatch:
    types: [promote]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch pending-production snapshot
        env:
          TOKEN: ${{ github.token }}
        run: |
          git clone --depth 1 --branch pending-production \
            "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git" snapshot
          rm -rf snapshot/.git

      - name: Deploy snapshot to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler@4 pages deploy snapshot \
            --project-name=odorisato \
            --branch=main \
            --commit-message="Promote $(date -u +%Y-%m-%dT%H:%M:%SZ)"
