name: Promote to production

on:
  workflow_dispatch:
  repository_dispatch:
    types: [promote]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch pending-production snapshot
        env:
          TOKEN: ${{ github.token }}
        run: |
          git clone --depth 1 --branch pending-production \
            "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git" snapshot
          rm -rf snapshot/.git

      - name: Deploy snapshot to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: '4.95.0'
          command: pages deploy snapshot --project-name=odorisato --branch=main --commit-message=Promote-${{ github.run_id }}
