name: Build preview

on:
  workflow_dispatch:
    inputs:
      from:
        description: Trigger source (manual / microcms)
        required: false
        default: manual
  repository_dispatch:
    types: [build-preview]

concurrency:
  group: preview-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.14.1
          cache: npm

      - name: Restore Astro/Vite caches
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules/.astro
            node_modules/.vite
          key: astro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          PUBLIC_WORKER_URL: ${{ secrets.PUBLIC_WORKER_URL }}

      - name: Deploy to Cloudflare Pages (preview)
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: '4.95.0'
          command: pages deploy dist --project-name=odorisato-preview --branch=main --commit-hash=${{ github.sha }}

      - name: Snapshot built dist into pending-production branch
        env:
          TOKEN: ${{ github.token }}
        working-directory: dist
        run: |
          git init -b main
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Build snapshot ${GITHUB_SHA:0:7}"
          git push -f "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git" HEAD:pending-production
